---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: networks.skupper.io
spec:
  group: skupper.io
  versions:
    - name: v2alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          description: |-
            A Network can be placed along with a Site resource and it is used to
            indicate that the given Site is a member of the indicated Network ID.
            
            A single Network can be associated with a Site and it must be named "network".
            
            Once a Network is defined, all Sites that compose your network must
            be part of the same Network ID for your VAN to operate.
          type: object
          properties:
            spec:
              type: object
              properties:
                networkId:
                  type: string
                  description: The ID of the Virtual Application Network to participate.
                image:
                  type: string
                  description: |-
                    The Site Controller image to use. If not provided,
                    the default one defined by the controller will be used.
                settings:
                  description: |-
                    Advanced. A map containing additional settings. Each map
                    entry has a string name and a string value.

                    **Note:** In  general, we recommend not changing `settings`
                    from their default values.
                  type: object
                  additionalProperties:
                    type: string
              required:
                - networkId
            status:
              type: object
              properties:
                status:
                  description: |-
                    The current state of the resource.
                    - `Pending`: The resource is being processed.
                    - `Error`: There was an error processing the resource. See `message` for more information.
                    - `Ready`: The resource is ready to use.
                  type: string
                message:
                  description: |-
                    A human-readable status message. Error messages are reported here.
                  type: string
                conditions:
                  type: array
                  description: |-
                    A set of named conditions describing the current state of the resource.

                    - `Configured`: The output resources for this resource have been created.
                    - `Running`: There is at least one router pod running.
                    - `Resolved`: The hostname or IP address for link access is available.
                    - `Ready`: The site is ready for use. All other conditions are true.
                  items:
                    type: object
                    properties:
                      lastTransitionTime:
                        format: date-time
                        type: string
                      message:
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        enum:
                        - "True"
                        - "False"
                        - Unknown
                        type: string
                      type:
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                    - lastTransitionTime
                    - message
                    - reason
                    - status
                    - type
      subresources:
        status: {}
      additionalPrinterColumns:
      - name: Network ID
        type: string
        description: The Network ID to join
        jsonPath: .spec.networkId
      - name: Status
        type: string
        description: The status of the VAN site
        jsonPath: .status.status
      - name: Message
        type: string
        description: Any human readable message relevant to the site
        jsonPath: .status.message
  scope: Namespaced
  names:
    plural: networks
    singular: network
    kind: Network
    listKind: NetworkList
    shortNames:
    - nw
