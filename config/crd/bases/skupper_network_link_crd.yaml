apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: networklinks.skupper.io
spec:
  group: skupper.io
  versions:
    - name: v2alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          description: |-
            A NetworkLink can be defined when you have a Network that defines a network id.
    
            The NetworkLink is used to establish an inter-network communication link with another
            Site that accepts such kind of incoming link, usually a central management backbone.
    
            The Network resource must be in ready state before a NetworkLink resource can be configured.
          type: object
          properties:
            spec:
              type: object
              properties:
                hostname:
                  type: string
                  description: >-
                    The hostname used to establish an inter-network connection.
                port:
                  type: integer
                  description: The port number to establish a connection using an inter-network link.
                tlsCredentials:
                  type: string
                  description: >-
                    The name of the Secret that contains the TLS Credentials used to
                    establish an mTLS connection.
                settings:
                  description: |-
                    Advanced. A map containing additional settings. Each map
                    entry has a string name and a string value.

                    **Note:** In  general, we recommend not changing `settings`
                    from their default values.
                  type: object
                  additionalProperties:
                    type: string
              required:
                - hostname
                - port
                - tlsCredentials
            status:
              type: object
              properties:
                status:
                  description: |-
                    The current state of the resource.
                    - `Pending`: The resource is being processed.
                    - `Error`: There was an error processing the resource. See `message` for more information.
                    - `Ready`: The resource is ready to use.
                  type: string
                message:
                  description: |-
                    A human-readable status message. Error messages are reported here.
                  type: string
                conditions:
                  type: array
                  description: |-
                    A set of named conditions describing the current state of the resource.

                    - `Configured`: The output resources for this resource have been created.
                    - `Running`: There is at least one router pod running.
                    - `Resolved`: The hostname or IP address for link access is available.
                    - `Ready`: The site is ready for use. All other conditions are true.
                  items:
                    type: object
                    properties:
                      lastTransitionTime:
                        format: date-time
                        type: string
                      message:
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        enum:
                        - "True"
                        - "False"
                        - Unknown
                        type: string
                      type:
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                    - lastTransitionTime
                    - message
                    - reason
                    - status
                    - type
      subresources:
        status: {}
      additionalPrinterColumns:
      - name: Hostname
        type: string
        description: The hostname used to establish an inter-network connection
        jsonPath: .spec.hostname
      - name: Port
        type: integer
        description: The port number to establish a connection using an inter-network link
        jsonPath: .spec.port
      - name: Credentials
        type: string
        description: The Secret name that contains the TLS Credentials used to establish an mTLS connection
        jsonPath: .spec.tlsCredentials
      - name: Status
        type: string
        description: The status of the NetworkLink
        jsonPath: .status.status
      - name: Message
        type: string
        description: Any human readable message relevant to the site
        jsonPath: .status.message
  scope: Namespaced
  names:
    plural: networklinks
    singular: networklink
    kind: NetworkLink
    listKind: NetworkLinkList
    shortNames:
    - nwln
