---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "network-observer.fullname" . }}-prometheus
  labels:
    {{- include "network-observer.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  prometheus.yml: |
{{ .Values.prometheus.config | nindent 4 }}
