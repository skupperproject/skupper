---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "network-observer.fullname" . }}
  labels:
    {{- include "network-observer.labels" . | nindent 4 }}
  {{- if or .Values.commonAnnotations .Values.tls.openshiftIssued }}
  annotations:
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if .Values.tls.openshiftIssued }}
    service.beta.openshift.io/serving-cert-secret-name: {{ include "network-observer.tlsSecretName" . }}
    {{- end }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: https
      protocol: TCP
      name: https
  selector:
    {{- include "network-observer.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "network-observer.fullname" . }}-metrics
  labels:
    {{- include "network-observer.labels" . | nindent 4 }}
    app.kubernetes.io/component: metrics
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9000
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "network-observer.selectorLabels" . | nindent 4 }}
